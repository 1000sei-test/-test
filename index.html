<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>家計簿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --bg:#f2f2f7;--card:#fff;--border:#c6c6c8;--text:#1c1c1e;--muted:#8e8e93;
  --accent:#007aff;--red:#ff3b30;--green:#34c759;--purple:#af52de;--orange:#ff9500;
  --hdr:#1c1c1e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--hdr);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-nav{background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px 10px}
.hdr-center{text-align:center}
.hdr-month{font-size:17px;font-weight:700}
.hdr-sub{font-size:12px;color:#aaa;margin-top:1px}
.hdr-sub span{color:#ff6b6b;font-weight:700}

/* SCROLL & PAGES */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none}
.page.active{display:block}

/* NAV */
.nav{background:var(--card);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;padding:10px 4px 10px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;min-height:60px}
.nav-btn.active{color:var(--accent)}
.nav-ic{font-size:24px;line-height:1}

/* CALENDAR */
.cal-hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;text-align:center;font-size:16px;font-weight:600}
.wk-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--card);border-bottom:1px solid var(--border)}
.wk-lbl{text-align:center;font-size:11px;color:var(--muted);padding:6px 0}
.wk-lbl.sun{color:var(--red)}.wk-lbl.sat{color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:#888;gap:2px;border-top:2px solid #888;border-left:2px solid #888;border-right:2px solid #888;border-bottom:2px solid #888}
.cc{background:#ffffff;min-height:70px;padding:4px 5px;cursor:pointer;position:relative;overflow:hidden}
.cc.empty{background:#d1d1d6;cursor:default}
.cc.sunday{background:#fff5f5}.cc.saturday{background:#f0f5ff}
.cc .cn{font-size:13px}
.cc.sunday .cn{color:var(--red)}.cc.saturday .cn{color:var(--accent)}
.cc.today .cn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--accent);border-radius:50%;color:#fff;font-size:12px;font-weight:700}
.cc .ca{font-size:9px;margin-top:2px;color:var(--red);font-weight:600;line-height:1.3}
.cc .ci{font-size:9px;color:var(--green);font-weight:600}
