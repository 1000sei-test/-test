<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿 Pro+</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
–bg: #f5f3ef;
–card: #ffffff;
–border: #e0dcd4;
–text: #2c2c2c;
–muted: #888;
–accent: #2c2c2c;
–sunday: #c0392b;
–saturday: #2980b9;
–bento-accent: #5c4033;
–income: #27ae60;
–expense: #c0392b;
–fixed: #8e44ad;
–budget-ok: #27ae60;
–budget-warn: #e67e22;
–budget-over: #c0392b;
}

- { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: ‘Noto Sans JP’, sans-serif; background: var(–bg); color: var(–text); min-height: 100vh; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(–card); border-top: 1px solid var(–border); z-index: 100; }
.nav-btn { flex: 1; padding: 8px 2px 6px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 10px; color: var(–muted); display: flex; flex-direction: column; align-items: center; gap: 2px; transition: color .2s; }
.nav-btn.active { color: var(–accent); font-weight: 700; }
.nav-btn .icon { font-size: 18px; }

/* PAGES */
.page { display: none; padding: 14px 14px 80px; }
.page.active { display: block; }

/* COMMON */
.card { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.field { margin-bottom: 12px; }
label { font-size: 12px; color: var(–muted); display: block; margin-bottom: 4px; }
input[type=text], input[type=number], input[type=date], select, textarea { width: 100%; border: 1px solid var(–border); border-radius: 8px; padding: 9px 10px; font-family: inherit; font-size: 14px; background: var(–bg); color: var(–text); outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(–accent); }
textarea { resize: vertical; min-height: 56px; }
.btn-primary { width: 100%; padding: 12px; background: var(–accent); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-primary:hover { opacity: .85; }
.btn-primary.bento { background: var(–bento-accent); }
.btn-primary.cancel-btn { background: var(–muted); margin-top: 8px; }
.btn-sm { padding: 7px 14px; border: 1px solid var(–border); border-radius: 8px; background: var(–card); font-family: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; }

/* CALENDAR */
.month-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.month-title { font-size: 17px; font-weight: 700; }
.month-nav { border: 1px solid var(–border); background: var(–card); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.summary-bar { background: var(–card); border: 1px solid var(–border); border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; font-size: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.summary-bar .val { font-weight: 700; font-size: 14px; }
.summary-bar .val.out { color: var(–expense); }
.summary-bar .val.in  { color: var(–income); }
.summary-bar .val.fix { color: var(–fixed); }

.budget-bar-wrap { background: var(–card); border: 1px solid var(–border); border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; }
.budget-bar-label { font-size: 11px; color: var(–muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
.budget-bar-track { background: #eee; border-radius: 99px; height: 8px; overflow: hidden; }
.budget-bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-head { text-align: center; font-size: 11px; font-weight: 500; color: var(–muted); padding: 4px 0; }
.cal-head.sun { color: var(–sunday); }
.cal-head.sat { color: var(–saturday); }
.cal-day { background: var(–card); border: 1px solid var(–border); border-radius: 6px; min-height: 54px; padding: 3px 4px; cursor: pointer; transition: border-color .15s; position: relative; overflow: hidden; }
.cal-day:hover { border-color: #aaa; }
.cal-day.today { border: 2px solid var(–accent); }
.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-day .day-num { font-size: 12px; font-weight: 500; }
.cal-day.sunday .day-num { color: var(–sunday); }
.cal-day.saturday .day-num { color: var(–saturday); }
.cal-day .day-out { font-size: 9px; margin-top: 1px; color: var(–expense); font-weight: 600; }
.cal-day .day-fix { font-size: 9px; color: var(–fixed); font-weight: 600; }
.cal-day .bento-dot { position: absolute; top: 3px; right: 3px; font-size: 9px; }

.record-list { margin-top: 4px; }
.record-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(–border); font-size: 13px; }
.record-item:last-child { border-bottom: none; }
.record-left { display: flex; flex-direction: column; gap: 2px; }
.record-title { font-weight: 500; }
.record-meta { font-size: 10px; color: var(–muted); display: flex; gap: 4px; }
.badge-fixed { background: #f3e5fa; color: var(–fixed); border-radius: 4px; padding: 1px 5px; font-size: 10px; font-weight: 700; }
.record-amount { font-weight: 700; }
.record-amount.out { color: var(–expense); }
.record-amount.in  { color: var(–income); }
.record-del { border: none; background: none; cursor: pointer; color: var(–muted); font-size: 16px; padding: 4px; }

/* INPUT */
.tab-row { display: flex; gap: 8px; margin-bottom: 12px; }
.tab-btn { flex: 1; padding: 8px; border: 1px solid var(–border); border-radius: 8px; background: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; transition: all .15s; }
.tab-btn.active-out { background: var(–expense); color: #fff; border-color: var(–expense); }
.tab-btn.active-in  { background: var(–income);  color: #fff; border-color: var(–income); }

/* BENTO */
.bento-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 12px; }
.bento-cal-head { text-align: center; font-size: 11px; color: var(–muted); padding: 4px 0; }
.bento-cal-head.sun { color: var(–sunday); }
.bento-cal-head.sat { color: var(–saturday); }
.bento-day { background: var(–card); border: 1px solid var(–border); border-radius: 6px; min-height: 42px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; transition: all .15s; user-select: none; }
.bento-day:hover { border-color: var(–bento-accent); }
.bento-day.today { border: 2px solid #555; }
.bento-day.selected { background: var(–bento-accent); color: #fff; border-color: var(–bento-accent); font-weight: 700; }
.bento-day.empty { background: transparent; border-color: transparent; cursor: default; }
.bento-day.sunday:not(.selected) { color: var(–sunday); }
.bento-day.saturday:not(.selected) { color: var(–saturday); }
.bento-day.registered:not(.selected) { background: #f0e6d3; border-color: #c4a882; }
.selected-count { font-size: 13px; color: var(–muted); text-align: center; margin-bottom: 10px; }

/* STATS */
.stats-seg { display: flex; background: var(–border); border-radius: 10px; padding: 3px; margin-bottom: 14px; gap: 3px; }
.stats-seg-btn { flex: 1; padding: 7px; border: none; background: none; font-family: inherit; font-size: 12px; font-weight: 500; border-radius: 7px; cursor: pointer; transition: all .2s; color: var(–muted); }
.stats-seg-btn.active { background: var(–card); color: var(–text); font-weight: 700; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

.stats-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.stats-nav-title { font-size: 16px; font-weight: 700; }

.budget-set-row { display: flex; align-items: center; gap: 8px; }
.budget-set-row label { margin: 0; font-size: 13px; color: var(–text); white-space: nowrap; }
.budget-set-row .unit { font-size: 12px; color: var(–muted); white-space: nowrap; }

.genre-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(–border); }
.genre-row:last-child { border-bottom: none; }
.genre-name { font-size: 12px; width: 60px; flex-shrink: 0; }
.genre-bar-track { flex: 1; background: #eee; border-radius: 99px; height: 6px; overflow: hidden; }
.genre-bar-fill { height: 100%; border-radius: 99px; background: var(–expense); transition: width .3s; }
.genre-bar-fill.fixed-fill { background: var(–fixed); }
.genre-amount { font-size: 12px; font-weight: 600; color: var(–expense); min-width: 72px; text-align: right; }

.annual-total-card { background: var(–accent); color: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.annual-total-card .big { font-size: 26px; font-weight: 700; }
.annual-total-card .small { font-size: 12px; opacity: .75; margin-top: 2px; }
.annual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.annual-sub-card { background: var(–card); border: 1px solid var(–border); border-radius: 10px; padding: 12px; }
.annual-sub-card .lbl { font-size: 11px; color: var(–muted); }
.annual-sub-card .val { font-size: 18px; font-weight: 700; margin-top: 2px; }

.bar-legend { display: flex; gap: 12px; justify-content: center; margin-bottom: 10px; font-size: 11px; }
.bar-legend span { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; }
.month-bars { display: grid; grid-template-columns: repeat(12,1fr); gap: 3px; align-items: end; height: 110px; margin-bottom: 4px; }
.month-bar-wrap { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
.month-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; }
.month-bar.out-bar { background: var(–expense); opacity: .8; }
.month-bar.in-bar  { background: var(–income);  opacity: .6; }
.month-bar-lbl { font-size: 8px; color: var(–muted); margin-top: 2px; }

.month-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.month-table th { text-align: left; padding: 6px 4px; border-bottom: 2px solid var(–border); color: var(–muted); font-weight: 500; }
.month-table td { padding: 7px 4px; border-bottom: 1px solid var(–border); }
.month-table tr:last-child td { border-bottom: none; }
.month-table .num { text-align: right; }
.over { color: var(–expense); font-weight: 700; }

.settings-section { margin-bottom: 18px; }
.settings-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(–muted); }
.backup-btn { width: 100%; padding: 10px; border: 1px solid var(–border); border-radius: 8px; background: var(–card); font-family: inherit; font-size: 13px; cursor: pointer; margin-bottom: 6px; text-align: left; }

.toast { position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="toast" id="toast"></div>

<!-- CALENDAR -->

<div class="page active" id="page-cal">
  <div class="month-header">
    <button class="month-nav" id="cal-prev">‹</button>
    <div class="month-title" id="cal-month-title"></div>
    <button class="month-nav" id="cal-next">›</button>
  </div>
  <div class="summary-bar">
    <div>支出 <span class="val out" id="cal-total-out">0</span>円</div>
    <div>収入 <span class="val in"  id="cal-total-in">0</span>円</div>
    <div>固定 <span class="val fix" id="cal-total-fix">0</span>円</div>
  </div>
  <div class="budget-bar-wrap" id="budget-bar-wrap" style="display:none">
    <div class="budget-bar-label">
      <span id="budget-bar-text"></span>
      <span id="budget-bar-pct"></span>
    </div>
    <div class="budget-bar-track"><div class="budget-bar-fill" id="budget-bar-fill"></div></div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="day-detail" style="display:none;margin-top:12px;">
    <div class="card">
      <div class="card-title" id="day-detail-title"></div>
      <div class="record-list" id="day-record-list"></div>
    </div>
  </div>
</div>

<!-- INPUT -->

<div class="page" id="page-input">
  <div class="card">
    <div class="card-title">✍️ 収支登録</div>
    <div class="tab-row">
      <button class="tab-btn active-out" id="tab-out" onclick="setType('out')">支出</button>
      <button class="tab-btn" id="tab-in" onclick="setType('in')">収入</button>
    </div>
    <div class="field"><label>日付</label><input type="date" id="inp-date"></div>
    <div class="field"><label>タイトル</label><input type="text" id="inp-title" placeholder="例: 電気代"></div>
    <div class="field">
      <label>ジャンル</label>
      <select id="inp-genre">
        <option>食費</option>
        <option>弁当代</option>
        <option>固定費</option>
        <option>交通費</option>
        <option>日用品</option>
        <option>エンタメ</option>
        <option>医療</option>
        <option>給与</option>
        <option>その他</option>
      </select>
    </div>
    <div class="field"><label>支払い方法</label><select id="inp-payment"></select></div>
    <div class="field"><label>金額（円）</label><input type="number" id="inp-amount" placeholder="0" min="0"></div>
    <div class="field"><label>メモ</label><textarea id="inp-memo" placeholder="任意"></textarea></div>
    <button class="btn-primary" onclick="saveRecord()">保存</button>
    <button class="btn-primary cancel-btn" onclick="clearInput()">キャンセル</button>
  </div>
</div>

<!-- BENTO -->

<div class="page" id="page-bento">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <span style="font-size:26px">🍱</span>
    <h2 style="font-size:17px;font-weight:700">弁当代 一括登録</h2>
  </div>
  <div class="card">
    <div class="field"><label>単価（円）</label><input type="number" id="bento-price" value="500" min="0"></div>
    <div class="month-header" style="margin-bottom:8px">
      <button class="month-nav" id="bento-prev">‹</button>
      <div class="month-title" id="bento-month-title"></div>
      <button class="month-nav" id="bento-next">›</button>
    </div>
    <div class="bento-cal-grid" id="bento-grid"></div>
    <div class="selected-count" id="bento-count">0日 選択中</div>
    <button class="btn-primary bento" onclick="registerBento()">選択した日に一括登録</button>
  </div>
</div>

<!-- STATS -->

<div class="page" id="page-stats">
  <div class="stats-seg">
    <button class="stats-seg-btn active" id="seg-monthly" onclick="setStatsSeg('monthly')">月別集計</button>
    <button class="stats-seg-btn"        id="seg-annual"  onclick="setStatsSeg('annual')">年間集計</button>
  </div>

  <div id="stats-monthly">
    <div class="stats-nav">
      <button class="month-nav" id="stats-prev">‹</button>
      <div class="stats-nav-title" id="stats-month-title"></div>
      <button class="month-nav" id="stats-next">›</button>
    </div>
    <div class="card">
      <div class="card-title">💰 月予算</div>
      <div class="budget-set-row">
        <label>予算額</label>
        <input type="number" id="budget-input" placeholder="0" min="0">
        <span class="unit">円</span>
        <button class="btn-sm" onclick="saveBudget()">保存</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📊 ジャンル別支出</div>
      <div id="genre-breakdown"></div>
    </div>
  </div>

  <div id="stats-annual" style="display:none">
    <div class="stats-nav">
      <button class="month-nav" id="annual-prev">‹</button>
      <div class="stats-nav-title" id="annual-year-title"></div>
      <button class="month-nav" id="annual-next">›</button>
    </div>
    <div class="annual-total-card">
      <div class="small">年間支出合計</div>
      <div class="big" id="annual-out-total">¥0</div>
      <div class="small" id="annual-in-total" style="margin-top:6px">収入: ¥0</div>
    </div>
    <div class="annual-grid">
      <div class="annual-sub-card">
        <div class="lbl">固定費合計</div>
        <div class="val" style="color:var(--fixed)" id="annual-fixed">¥0</div>
      </div>
      <div class="annual-sub-card">
        <div class="lbl">変動費合計</div>
        <div class="val" style="color:var(--expense)" id="annual-variable">¥0</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📈 月別推移</div>
      <div class="bar-legend">
        <span><div class="leg-dot" style="background:var(--expense);opacity:.8"></div>支出</span>
        <span><div class="leg-dot" style="background:var(--income);opacity:.6"></div>収入</span>
      </div>
      <div class="month-bars" id="annual-bars"></div>
      <div style="display:grid;grid-template-columns:repeat(12,1fr);gap:3px" id="annual-bars-labels"></div>
    </div>
    <div class="card">
      <div class="card-title">📋 月別一覧</div>
      <table class="month-table">
        <thead><tr><th>月</th><th class="num">支出</th><th class="num">収入</th><th class="num">予算</th></tr></thead>
        <tbody id="annual-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- SETTINGS -->

<div class="page" id="page-settings">
  <div class="card">
    <div class="card-title">⚙️ 設定</div>
    <div class="settings-section">
      <h3>💳 支払い方法（カンマ区切り）</h3>
      <div class="field"><input type="text" id="payment-methods-input" placeholder="現金,クレジット,PayPay"></div>
      <button class="btn-primary" onclick="saveMethods()">マスタ更新</button>
    </div>
    <div class="settings-section">
      <h3>☁️ バックアップ・復元</h3>
      <button class="backup-btn" onclick="exportData()">📤 データをエクスポート（JSON）</button>
      <button class="backup-btn" onclick="document.getElementById('import-file').click()">📥 データを復元する</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- NAV -->

<nav class="nav">
  <button class="nav-btn active" id="nav-cal"      onclick="showPage('cal')">     <span class="icon">📅</span>カレンダー</button>
  <button class="nav-btn"        id="nav-input"    onclick="showPage('input')">   <span class="icon">✍️</span>入力</button>
  <button class="nav-btn"        id="nav-bento"    onclick="showPage('bento')">   <span class="icon">🍱</span>弁当</button>
  <button class="nav-btn"        id="nav-stats"    onclick="showPage('stats')">   <span class="icon">📊</span>集計</button>
  <button class="nav-btn"        id="nav-settings" onclick="showPage('settings')"><span class="icon">⚙️</span>設定</button>
</nav>

<script>
let records = JSON.parse(localStorage.getItem('kk_records') || '[]');
let methods = JSON.parse(localStorage.getItem('kk_methods') || '["現金","クレジット","PayPay"]');
let budgets = JSON.parse(localStorage.getItem('kk_budgets') || '{}');

let calYear, calMonth, bentoYear, bentoMonth, statsYear, statsMonth, annualYear;
let bentoSelected = new Set();
let currentType = 'out';
let selectedCalDay = null;
let statsSeg = 'monthly';
const today = new Date();

function init() {
  calYear = statsYear = annualYear = today.getFullYear();
  calMonth = statsMonth = today.getMonth();
  bentoYear = today.getFullYear();
  bentoMonth = today.getMonth();
  renderCal();
  renderBentoCal();
  renderPaymentSelect();
  document.getElementById('inp-date').value = fmtDate(today);
  document.getElementById('payment-methods-input').value = methods.join(',');
}

function fmtDate(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n) { return String(n).padStart(2,'0'); }
function ym(y,m) { return y+'-'+pad(m+1); }

function showPage(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='cal')   renderCal();
  if(p==='stats') renderStats();
}

// === CALENDAR ===
function renderCal() {
  document.getElementById('cal-month-title').textContent = calYear+'年 '+(calMonth+1)+'月';
  const days=['日','月','火','水','木','金','土'], cls=['sun','','','','','','sat'];
  let html = days.map((d,i)=>`<div class="cal-head ${cls[i]}">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1).getDay(), last=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++) html+=`<div class="cal-day empty"></div>`;
  let totalOut=0,totalIn=0,totalFix=0;
  for(let d=1;d<=last;d++){
    const ds=ym(calYear,calMonth)+'-'+pad(d);
    const recs=records.filter(r=>r.date===ds);
    const dOut=recs.filter(r=>r.type==='out').reduce((s,r)=>s+r.amount,0);
    const dIn =recs.filter(r=>r.type==='in').reduce((s,r)=>s+r.amount,0);
    const dFix=recs.filter(r=>r.type==='out'&&r.genre==='固定費').reduce((s,r)=>s+r.amount,0);
    totalOut+=dOut; totalIn+=dIn; totalFix+=dFix;
    const dow=new Date(calYear,calMonth,d).getDay();
    const isToday=calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate();
    const hasBento=recs.some(r=>r.genre==='弁当代');
    html+=`<div class="cal-day ${dow===0?'sunday':dow===6?'saturday':''} ${isToday?'today':''}" onclick="showDayDetail('${ds}',${d})">
      <div class="day-num">${d}</div>
      ${dOut>0?`<div class="day-out">-¥${dOut.toLocaleString()}</div>`:''}
      ${dFix>0?`<div class="day-fix">固¥${dFix.toLocaleString()}</div>`:''}
      ${hasBento?`<div class="bento-dot">🍱</div>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  document.getElementById('cal-total-out').textContent = totalOut.toLocaleString();
  document.getElementById('cal-total-in').textContent  = totalIn.toLocaleString();
  document.getElementById('cal-total-fix').textContent = totalFix.toLocaleString();

  const key=ym(calYear,calMonth), budget=budgets[key]||0;
  const wrap=document.getElementById('budget-bar-wrap');
  if(budget>0){
    wrap.style.display='block';
    const pct=Math.min(totalOut/budget*100,100);
    const fill=document.getElementById('budget-bar-fill');
    fill.style.width=pct+'%';
    fill.style.background=totalOut>budget?'var(--budget-over)':pct>80?'var(--budget-warn)':'var(--budget-ok)';
    document.getElementById('budget-bar-text').textContent=`予算¥${budget.toLocaleString()} / 支出¥${totalOut.toLocaleString()}`;
    document.getElementById('budget-bar-pct').textContent=Math.round(totalOut/budget*100)+'%';
  } else { wrap.style.display='none'; }

  document.getElementById('day-detail').style.display='none';
  selectedCalDay=null;
}

function showDayDetail(ds,d){
  const recs=records.filter(r=>r.date===ds);
  if(recs.length===0){ document.getElementById('inp-date').value=ds; showPage('input'); return; }
  selectedCalDay=ds;
  document.getElementById('day-detail-title').textContent=(calMonth+1)+'月'+d+'日の記録';
  document.getElementById('day-record-list').innerHTML=recs.map(r=>`
    <div class="record-item">
      <div class="record-left">
        <div class="record-title">${r.title}${r.genre==='固定費'?` <span class="badge-fixed">固定費</span>`:''}</div>
        <div class="record-meta"><span>${r.genre}</span><span>・</span><span>${r.payment}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="record-amount ${r.type}">${r.type==='out'?'-':'+'} ¥${r.amount.toLocaleString()}</div>
        <button class="record-del" onclick="deleteRecord(${records.indexOf(r)})">✕</button>
      </div>
    </div>`).join('');
  document.getElementById('day-detail').style.display='block';
  document.getElementById('day-detail').scrollIntoView({behavior:'smooth'});
}

document.getElementById('cal-prev').onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); };
document.getElementById('cal-next').onclick=()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); };

// === INPUT ===
function setType(t){
  currentType=t;
  document.getElementById('tab-out').className='tab-btn'+(t==='out'?' active-out':'');
  document.getElementById('tab-in').className ='tab-btn'+(t==='in' ?' active-in':'');
}
function renderPaymentSelect(){ document.getElementById('inp-payment').innerHTML=methods.map(m=>`<option>${m}</option>`).join(''); }
function saveRecord(){
  const date=document.getElementById('inp-date').value;
  const title=document.getElementById('inp-title').value.trim();
  const genre=document.getElementById('inp-genre').value;
  const payment=document.getElementById('inp-payment').value;
  const amount=parseInt(document.getElementById('inp-amount').value)||0;
  const memo=document.getElementById('inp-memo').value.trim();
  if(!date||!title||!amount){ showToast('日付・タイトル・金額は必須です'); return; }
  records.push({date,title,genre,payment,amount,memo,type:currentType});
  saveRecords(); clearInput(); showToast('保存しました ✓');
}
function clearInput(){
  document.getElementById('inp-title').value='';
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-memo').value='';
  document.getElementById('inp-date').value=fmtDate(today);
}
function deleteRecord(idx){
  if(!confirm('削除しますか？')) return;
  records.splice(idx,1); saveRecords();
  if(selectedCalDay) showDayDetail(selectedCalDay,parseInt(selectedCalDay.split('-')[2]));
  renderCal();
}
function saveRecords(){ localStorage.setItem('kk_records',JSON.stringify(records)); }

// === BENTO ===
function renderBentoCal(){
  document.getElementById('bento-month-title').textContent=bentoYear+'年 '+(bentoMonth+1)+'月';
  const days=['日','月','火','水','木','金','土'];
  let html=days.map((d,i)=>`<div class="bento-cal-head ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  const first=new Date(bentoYear,bentoMonth,1).getDay(), last=new Date(bentoYear,bentoMonth+1,0).getDate();
  for(let i=0;i<first;i++) html+=`<div class="bento-day empty"></div>`;
  for(let d=1;d<=last;d++){
    const ds=ym(bentoYear,bentoMonth)+'-'+pad(d);
    const dow=new Date(bentoYear,bentoMonth,d).getDay();
    const isToday=bentoYear===today.getFullYear()&&bentoMonth===today.getMonth()&&d===today.getDate();
    const isSel=bentoSelected.has(ds), isReg=records.some(r=>r.date===ds&&r.genre==='弁当代');
    html+=`<div class="bento-day ${dow===0&&!isSel?'sunday':''} ${dow===6&&!isSel?'saturday':''} ${isSel?'selected':''} ${isReg&&!isSel?'registered':''} ${isToday?'today':''}" onclick="toggleBentoDay('${ds}')">${d}</div>`;
  }
  document.getElementById('bento-grid').innerHTML=html;
  document.getElementById('bento-count').textContent=bentoSelected.size+'日 選択中';
}
function toggleBentoDay(ds){ if(bentoSelected.has(ds)) bentoSelected.delete(ds); else bentoSelected.add(ds); renderBentoCal(); }
function registerBento(){
  const price=parseInt(document.getElementById('bento-price').value)||0;
  if(!price){ showToast('単価を入力してください'); return; }
  if(bentoSelected.size===0){ showToast('日付を選択してください'); return; }
  const payment=methods[0]||'現金';
  bentoSelected.forEach(ds=>records.push({date:ds,title:'弁当代',genre:'弁当代',payment,amount:price,memo:'一括登録',type:'out'}));
  saveRecords(); bentoSelected.clear(); renderBentoCal(); showToast('🍱 一括登録しました ✓');
}
document.getElementById('bento-prev').onclick=()=>{ bentoMonth--; if(bentoMonth<0){bentoMonth=11;bentoYear--;} bentoSelected.clear(); renderBentoCal(); };
document.getElementById('bento-next').onclick=()=>{ bentoMonth++; if(bentoMonth>11){bentoMonth=0;bentoYear++;} bentoSelected.clear(); renderBentoCal(); };

// === STATS ===
function setStatsSeg(seg){
  statsSeg=seg;
  document.getElementById('seg-monthly').classList.toggle('active',seg==='monthly');
  document.getElementById('seg-annual').classList.toggle('active',seg==='annual');
  document.getElementById('stats-monthly').style.display=seg==='monthly'?'block':'none';
  document.getElementById('stats-annual').style.display =seg==='annual' ?'block':'none';
  renderStats();
}
function renderStats(){ if(statsSeg==='monthly') renderMonthlyStats(); else renderAnnualStats(); }

function renderMonthlyStats(){
  document.getElementById('stats-month-title').textContent=statsYear+'年 '+(statsMonth+1)+'月';
  const key=ym(statsYear,statsMonth);
  document.getElementById('budget-input').value=budgets[key]||'';
  const recs=records.filter(r=>r.date.startsWith(key)&&r.type==='out');
  const genreMap={};
  recs.forEach(r=>{ genreMap[r.genre]=(genreMap[r.genre]||0)+r.amount; });
  const sorted=Object.entries(genreMap).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  let html='';
  if(sorted.length===0){
    html='<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">支出データがありません</div>';
  } else {
    sorted.forEach(([genre,amount])=>{
      const isFixed=genre==='固定費';
      html+=`<div class="genre-row">
        <div class="genre-name">${isFixed?'🔒':''} ${genre}</div>
        <div class="genre-bar-track"><div class="genre-bar-fill ${isFixed?'fixed-fill':''}" style="width:${amount/max*100}%"></div></div>
        <div class="genre-amount">¥${amount.toLocaleString()}</div>
      </div>`;
    });
  }
  document.getElementById('genre-breakdown').innerHTML=html;
}

document.getElementById('stats-prev').onclick=()=>{ statsMonth--; if(statsMonth<0){statsMonth=11;statsYear--;} renderStats(); };
document.getElementById('stats-next').onclick=()=>{ statsMonth++; if(statsMonth>11){statsMonth=0;statsYear++;} renderStats(); };

function saveBudget(){
  const key=ym(statsYear,statsMonth);
  const val=parseInt(document.getElementById('budget-input').value)||0;
  budgets[key]=val;
  localStorage.setItem('kk_budgets',JSON.stringify(budgets));
  renderCal(); showToast('予算を保存しました ✓');
}

function renderAnnualStats(){
  document.getElementById('annual-year-title').textContent=annualYear+'年';
  let totalOut=0,totalIn=0,totalFixed=0,totalVariable=0;
  const monthData=[]; let maxVal=0;
  for(let m=0;m<12;m++){
    const key=ym(annualYear,m);
    const recs=records.filter(r=>r.date.startsWith(key));
    const mOut  =recs.filter(r=>r.type==='out').reduce((s,r)=>s+r.amount,0);
    const mIn   =recs.filter(r=>r.type==='in').reduce((s,r)=>s+r.amount,0);
    const mFixed=recs.filter(r=>r.type==='out'&&r.genre==='固定費').reduce((s,r)=>s+r.amount,0);
    totalOut+=mOut; totalIn+=mIn; totalFixed+=mFixed; totalVariable+=(mOut-mFixed);
    maxVal=Math.max(maxVal,mOut,mIn);
    monthData.push({m,mOut,mIn,key});
  }
  document.getElementById('annual-out-total').textContent='¥'+totalOut.toLocaleString();
  document.getElementById('annual-in-total').textContent ='収入: ¥'+totalIn.toLocaleString();
  document.getElementById('annual-fixed').textContent   ='¥'+totalFixed.toLocaleString();
  document.getElementById('annual-variable').textContent='¥'+totalVariable.toLocaleString();

  const barMax=Math.max(maxVal,1);
  let barsHtml='', labelsHtml='';
  monthData.forEach(({m,mOut,mIn})=>{
    const oh=Math.round(mOut/barMax*100), ih=Math.round(mIn/barMax*100);
    barsHtml+=`<div class="month-bar-wrap">
      <div class="month-bar in-bar"  style="height:${ih}px"></div>
      <div class="month-bar out-bar" style="height:${oh}px"></div>
      <div class="month-bar-lbl">${m+1}月</div>
    </div>`;
  });
  document.getElementById('annual-bars').innerHTML=barsHtml;

  let tableHtml='';
  monthData.forEach(({m,mOut,mIn,key})=>{
    const budget=budgets[key]||0;
    const over=budget>0&&mOut>budget;
    tableHtml+=`<tr>
      <td>${m+1}月</td>
      <td class="num" style="color:var(--expense)">¥${mOut.toLocaleString()}</td>
      <td class="num" style="color:var(--income)">¥${mIn.toLocaleString()}</td>
      <td class="num ${over?'over':''}">${budget>0?'¥'+budget.toLocaleString()+(over?' ⚠':''):'-'}</td>
    </tr>`;
  });
  document.getElementById('annual-table-body').innerHTML=tableHtml;
}

document.getElementById('annual-prev').onclick=()=>{ annualYear--; renderAnnualStats(); };
document.getElementById('annual-next').onclick=()=>{ annualYear++; renderAnnualStats(); };

// === SETTINGS ===
function saveMethods(){
  const raw=document.getElementById('payment-methods-input').value;
  methods=raw.split(',').map(s=>s.trim()).filter(Boolean);
  localStorage.setItem('kk_methods',JSON.stringify(methods));
  renderPaymentSelect(); showToast('更新しました ✓');
}
function exportData(){
  const blob=new Blob([JSON.stringify({records,methods,budgets},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='家計簿_'+fmtDate(today).replace(/-/g,'')+'.json';
  a.click();
}
function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.records) records=data.records;
      if(data.methods) methods=data.methods;
      if(data.budgets) budgets=data.budgets;
      saveRecords();
      localStorage.setItem('kk_methods',JSON.stringify(methods));
      localStorage.setItem('kk_budgets',JSON.stringify(budgets));
      renderPaymentSelect(); renderCal(); showToast('復元しました ✓');
    }catch(err){ showToast('ファイルが無効です'); }
  };
  reader.readAsText(file); e.target.value='';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
